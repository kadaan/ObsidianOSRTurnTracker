name: Release plugin

# Push a tag that matches the manifest version (e.g. 2.0.0, no "v" prefix) to cut a release.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Cheapest gate first, so a mismatched tag fails before a full install + build.
      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${MANIFEST_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${MANIFEST_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Runs the hygiene + release-metadata guards, so a regression blocks the release.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create release with build artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
